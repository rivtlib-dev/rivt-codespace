
linkColor: brown
linkFontName: DejaVuSansBold
fontsAlias:
  fontSerif: DejaVuSans
  fontSerifBold: DejaVuSans-Bold
  fontSerifBoldItalic: DejaVuSans-BoldOblique
  fontSerifItalic: DejaVuSans-Oblique
  fontMono: DejaVuSansMono
  fontMonoBold: DejaVuSansMono-Bold
  fontMonoBoldItalic: DejaVuSansMono-BoldOblique
  fontMonoItalic: DejaVuSansMono-Oblique
  fontSans: DejaVuSans
  fontSansBold: DejaVuSans-Bold
  fontSansBoldItalic: DejaVuSans-BoldOblique
  fontSansItalic: DejaVuSans-Oblique
  stdBold: DejaVuSans-Bold
pageSetup:
  firstTemplate: noHead
  height: null
  margin-bottom: 4mm
  margin-gutter: 1mm
  margin-left: 1.5cm
  margin-right: 1.5cm
  margin-top: 4mm
  size: letter
  spacing-footer: 10mm
  spacing-header: 10mm
  width: null
pageTemplates:
  coverPage:
    showFooter: true
    showHeader: false
    underline: false
  noHead:
    frames: [[0%,0%,100%,100%]]
    showFooter: true
    showHeader: false
    underline: false
  mainPage:
    frames: [[0%,0%,100%,110%]]
    showFooter: True
    showHeader: True
styles:
  base:
    allowWidows: 1
    allowOrphans: 1 
    alignment: TA_LEFT
    allowOrphans: false
    allowWidows: false
    backColor: null
    borderColor: null
    borderPadding: 5
    borderRadius: null
    borderWidth: 0
    bulletFontName: fontMono
    bulletFontSize: 10
    bulletIndent: 0
    firstLineIndent: 0
    fontName: fontSans
    fontSize: 10
    leading: 14
    hyphenation: false
    leftIndent: 0
    parent: null
    rightIndent: 0
    spaceAfter: 1
    spaceBefore: 1
    strike: false
    textColor: black
    wordWrap: null
    linkUnderline: false
    commands: []
  big-text:
    fontSize: 175%
    parent: base
    fontName: fontSans
  medium-text:
    fontSize: 130%
    parent: base
    fontName: fontSans
  small-text:
    fontSize: 125%
    parent: base
    fontName: fontSans 
  blockquote:
    leftIndent: 20
    parent: bodytext
  bodytext:
    alignment: TA_JUSTIFY
    hyphenation: true
    parent: normal
    spaceBefore: 6
  align-center:
    alignment: TA_CENTER
    parent: bodytext
  align-right:
    alignment: TA_RIGHT
    parent: bodytext
  code:
    spaceBefore: 3
    spaceAfter: 3
    backColor: "#d1dede"
    borderColor: darkgray
    borderPadding: 6
    borderWidth: 0.5
    leftIndent: 0
    parent: literal
    fontName: fontMonoBold
  compgreen:
    textColor: green
    alignment: TA_RIGHT
    fontName: fontSansBold
  compred:
    textColor: red
    alignment: TA_RIGHT
    fontName: fontSansBold
  contents:
    parent: normal
  figure:
    spaceBefore: 18
    spaceAfter: 12
    alignment: TA_CENTER
    colWidths:
      - 100%
    commands:
      - - VALIGN
        - - 0
          - 0
        - - -1
          - -1
        - TOP
      - - ALIGN
        - - 0
          - 0
        - - -1
          - -1
        - CENTER
    parent: bodytext
  figure-caption:
    alignment: TA_CENTER
    fontName: fontSans
    parent: bodytext
  figure-legend:
    parent: bodytext
  footer:
    parent: normal
    fontName: fontSans
    fontSize: 9
  header:
    parent: normal
    fontName: fontSans
    fontSize: 9
  footer-box:
    parent: normal
    alignment: TA_CENTER
    fontName: fontSans
    fontSize: 9
    commands:
      - - BOX
        - - 0
          - 0
        - - -1
          - -1
        - 0.25
        - transparent
  header-box:
    parent: normal
    alignment: TA_RIGHT
    fontName: fontSans
    fontSize: 9
    commands:
      - - BOX
        - - 0
          - 0
        - - -1
          - -1
        - 0.25
        - transparent
  admonition:
  heading:
    keepWithNext: true
    parent: normal
    spaceAfter: 4
    spaceBefore: 10
    fontName: fontSerif
    textColor: "#222222"
  heading1:
